services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - data:/convex/data
    environment:
      # ── Convex Core ──────────────────────────────────────
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211

      # ── Concurrency Limits ───────────────────────────────
      - APPLICATION_MAX_CONCURRENT_MUTATIONS=16
      - APPLICATION_MAX_CONCURRENT_NODE_ACTIONS=16
      - APPLICATION_MAX_CONCURRENT_QUERIES=16
      - APPLICATION_MAX_CONCURRENT_V8_ACTIONS=16

      # ── Logging ──────────────────────────────────────────
      - RUST_LOG=info
      - DISABLE_METRICS_ENDPOINT=true
      - DOCUMENT_RETENTION_DELAY=172800   # 2 days

    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 10s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3210
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-8008}
      POSTGRES_DB: ${POSTGRES_DB:-OZ-T}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  data:
  pgdata:
